<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>График акции</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--tg-theme-bg-color, #0C1F3F);
    color: var(--tg-theme-text-color, #fff);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #header {
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #ticker-name {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
  }
  #ticker-price {
    font-size: 18px;
    font-weight: 600;
    color: #4ADE80;
    margin-left: auto;
  }

  #signal-bar {
    display: none;
    padding: 10px 16px;
    background: rgba(255,92,0,0.12);
    border-bottom: 1px solid rgba(255,92,0,0.3);
    gap: 8px;
    flex-wrap: wrap;
  }
  #signal-bar.visible { display: flex; }
  .sig-item {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
  }
  .sig-item span { font-weight: 700; color: #fff; }

  #chart-wrap {
    flex: 1;
    min-height: 300px;
  }
  #tradingview-widget-container {
    width: 100%;
    height: 100%;
    min-height: 380px;
  }

  #signal-panel {
    display: none;
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    gap: 10px;
    flex-direction: column;
  }
  #signal-panel.visible { display: flex; }
  .signal-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }
  .signal-label { color: rgba(255,255,255,0.5); }
  .signal-val { font-weight: 700; font-size: 15px; }
  .val-green { color: #4ADE80; }
  .val-red   { color: #F87171; }
  .val-white { color: #fff; }

  #actions {
    display: flex;
    gap: 10px;
    padding: 12px 16px 20px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: block;
  }
  .btn-primary { background: #FF5C00; color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }

  #loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="header">
  <div id="ticker-name">—</div>
  <div id="ticker-price">Загрузка...</div>
</div>

<div id="signal-bar"></div>

<div id="chart-wrap">
  <div id="tradingview-widget-container">
    <div id="loading">Загружаем график...</div>
  </div>
</div>

<div id="signal-panel"></div>

<div id="actions">
  <a id="tv-link" class="btn btn-primary" href="#" target="_blank">Открыть в TradingView</a>
  <a id="yf-link" class="btn btn-secondary" href="#" target="_blank">Yahoo Finance</a>
</div>

<script>
// ── Telegram WebApp init ──────────────────────────────────────────────────
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Читаем параметры из URL ───────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const ticker  = (params.get('ticker') || 'AAPL').toUpperCase();
const entry   = params.get('entry');
const target  = params.get('target');
const stop    = params.get('stop');
const shares  = params.get('shares');
const cost    = params.get('cost');
const pot     = params.get('potential');
const risk    = params.get('risk');
const rsi     = params.get('rsi');
const flags   = params.get('flags');

// ── Заголовок ─────────────────────────────────────────────────────────────
document.getElementById('ticker-name').textContent = '$' + ticker;
document.title = '$' + ticker + ' — График';

// ── Ссылки ────────────────────────────────────────────────────────────────
document.getElementById('tv-link').href = `https://www.tradingview.com/symbols/NASDAQ-${ticker}/`;
document.getElementById('yf-link').href = `https://finance.yahoo.com/quote/${ticker}/`;

// ── Цена через Yahoo Finance (через CORS-free API) ────────────────────────
fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`)
  .then(r => r.json())
  .then(data => {
    const meta = data?.chart?.result?.[0]?.meta;
    if (meta) {
      const price = meta.regularMarketPrice?.toFixed(2);
      const prev  = meta.previousClose;
      const change = price && prev ? ((price - prev) / prev * 100).toFixed(2) : null;
      const el = document.getElementById('ticker-price');
      el.textContent = price ? `$${price}` : '—';
      if (change) {
        const sign = change >= 0 ? '+' : '';
        el.textContent += ` (${sign}${change}%)`;
        el.style.color = change >= 0 ? '#4ADE80' : '#F87171';
      }
    }
  })
  .catch(() => {
    document.getElementById('ticker-price').textContent = '';
  });

// ── Сигнал-бар (флаги) ────────────────────────────────────────────────────
if (flags) {
  const bar = document.getElementById('signal-bar');
  bar.classList.add('visible');
  flags.split(',').forEach(f => {
    const d = document.createElement('div');
    d.className = 'sig-item';
    d.textContent = decodeURIComponent(f);
    bar.appendChild(d);
  });
}

// ── Панель сигнала ────────────────────────────────────────────────────────
if (entry && target && stop) {
  const panel = document.getElementById('signal-panel');
  panel.classList.add('visible');
  const rows = [
    ['Купить',  `$${entry}`,   'val-white'],
    ['Акций',   `${shares} шт = $${cost}`, 'val-white'],
    ['Цель',    `$${target}`,  'val-green'],
    ['Потенциал', `+$${pot}`,  'val-green'],
    ['Стоп',    `$${stop}`,    'val-red'],
    ['Риск',    `-$${risk}`,   'val-red'],
    ['RSI',     rsi,           rsi < 40 ? 'val-green' : 'val-white'],
  ];
  rows.forEach(([label, val, cls]) => {
    if (!val || val === 'undefined') return;
    const div = document.createElement('div');
    div.className = 'signal-row';
    div.innerHTML = `<span class="signal-label">${label}</span><span class="signal-val ${cls}">${val}</span>`;
    panel.appendChild(div);
  });
}

// ── TradingView Widget ────────────────────────────────────────────────────
function loadChart() {
  const container = document.getElementById('tradingview-widget-container');
  container.innerHTML = '';
  const div = document.createElement('div');
  div.id = 'tv_chart';
  container.appendChild(div);

  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    "autosize": true,
    "symbol": `NASDAQ:${ticker}`,
    "interval": "D",
    "timezone": "Asia/Almaty",
    "theme": "dark",
    "style": "1",
    "locale": "ru",
    "hide_top_toolbar": false,
    "hide_legend": false,
    "allow_symbol_change": true,
    "save_image": false,
    "calendar": false,
    "studies": ["STD;RSI", "MACD@tv-basicstudies"],
    "support_host": "https://www.tradingview.com"
  });
  container.appendChild(script);
}

loadChart();
</script>
</body>
</html>
